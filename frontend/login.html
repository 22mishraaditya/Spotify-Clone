<!DOCTYPE html>
<html>
<head>
  <title>Audify Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-page"></body>

<div class="login-container">

  <h1 class="logo">Audify</h1>
  <h2>Log in to Audify</h2>

  <button class="social google">Continue with Google</button>
  <button class="social facebook">Continue with Facebook</button>
  <button class="social apple">Continue with Apple</button>

  <div class="divider">OR</div>

  <form id="loginForm">

    <label>Email or username</label>
    <input type="text" id="email" placeholder="Email or username">

    <label>Password</label>
    <input type="password" id="password" placeholder="Password">

    <a class="forgot">Forgot your password?</a>

    <button class="login-btn">Log In</button>

  </form>

  <p class="signup">
    Don't have an account? <a href="#">Sign up for Audify</a>
  </p>

</div>
<script src="script.js"></script>

</body>
</html>
